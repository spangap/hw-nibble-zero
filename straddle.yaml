# hw-nibble-zero — board HAL straddle for the Retia Nibble Zero.
#
# A plain (non-buildable) board component: it doesn't decide what the device
# DOES, it only makes the board usable by an app. The reticulous/reticulous
# buildable adds it with `--with spangap/hw-nibble-zero` and inherits the
# board's pin map, bring-up hook and hardware kconfig.
#
# Owns the Nibble Zero board HAL (esp-idf/src/nibblezero.cpp: the LoRa CS park).
# app_main, partitions, the OTA story and the browser SPA are NOT here — they
# belong to the buildable. Board reference:
# https://retia.io/products/nibble-zero-kit
#
# First cut: LoRa only. No on-device UI (the SSD1306 OLED, 6 buttons and the
# I2C sensor header exist on the board but are deliberately left unwired for
# now), no NeoPixel, no GNSS. This board adds nothing extra (no spangap-lcd):
# it builds headless.
schema_version: 1
name: spangap/hw-nibble-zero
prefix: nibblezero
firmware: esp-idf
version: 0.0.0
platforms: [idf]
# Board bring-up as a registered Service. app_main is generated by the buildable;
# it constructs NibbleZeroBoard and walks it. NibbleZeroBoard::onStart is
# bare-hardware (LoRa CS park) and runs before spangapInit(). No onInit — there
# is no on-device UI in this build.
services:
  - { class: NibbleZeroBoard, header: nibblezero.h }
# Board VALUES, fed to the symbols other straddles / IDF DEFINE through the
# collected staging/sdkconfig.spangap-fragments. A board straddle is non-
# buildable, so its sdkconfig.defaults would be IGNORED — everything that
# describes this hardware MUST live here in kconfig: to survive `--with`.
kconfig:
  # Board memory: the Nibble Zero is built around the ESP32-S3-Zero module
  # (ESP32-S3FH4R2) — 4 MB flash, 2 MB *quad* PSRAM. Like the Heltec V4 (and
  # unlike the T-Deck's S3R8 octal), PSRAM is QUAD, so SPIRAM_MODE_QUAD not _OCT.
  # NOTE: 4 MB flash is tight for the reticulous buildable — verify the module
  # revision on your board before trusting the partition math (see README).
  - CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y
  # State floor = the offset where the runtime read-write /state partition
  # begins; /state then fills the rest of the real 4 MB chip. WITHOUT this the
  # floor defaults to the whole flash container, so `app` expands to fill all
  # 4 MB and NO /state partition exists (the device has nowhere to store user
  # data). `app` is sized as align_down(floor - 0x10000 - fixed(0xa7000), 64KB):
  # at 3.32 MB the full reticulous binary (~2.55 MB) fits the resulting 0x290000
  # app slot with ~73 KB of margin, and /state gets the remaining ~696 KB.
  # Changing this relocates /state → existing devices factory-reset on the next
  # boot, so warn users before bumping it.
  - CONFIG_SPANGAP_MAX_FIRMWARE_KB=3400
  - CONFIG_SPIRAM_MODE_QUAD=y
  # One SX1262 LoRa modem on its own SPI bus (separate from the flash bus).
  # Pins per the Nibble Zero (Seeed Wio-SX1262 module) pin map. The SX1262 drives
  # DIO2 as its own RF antenna switch and DIO3 supplies the 1.8 V TCXO.
  - CONFIG_LORA_COUNT=1
  - CONFIG_LORA_SPI_HOST=2
  - CONFIG_LORA_SCK_PIN=13
  - CONFIG_LORA_MOSI_PIN=11
  - CONFIG_LORA_MISO_PIN=12
  - CONFIG_LORA0_CS_PIN=10
  - CONFIG_LORA0_DIO1_PIN=4
  - CONFIG_LORA0_BUSY_PIN=5
  - CONFIG_LORA0_RST_PIN=6
  - CONFIG_LORA0_TCXO_MV=1800
  - CONFIG_LORA0_DIO2_RF_SWITCH=y
  - CONFIG_LORA0_RADIO_SX1262=y
